name: reverse-proxy

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./configs/caddy:/etc/caddy:ro
      - ./volumes/caddy-data:/data
      - ./volumes/caddy-config:/config
      - ./volumes/caddy-logs:/logs
    networks:
      dmz:
        aliases:
          - rev-proxy

networks:
  dmz:
    external: true
